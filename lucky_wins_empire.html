  <script>
    function setSeason(s) {
      document.querySelectorAll(".season-btn").forEach(b => b.classList.remove("active"));
      document.getElementById("btn-season-" + s).classList.add("active");
      document.querySelectorAll(".season-wrap").forEach(w => w.classList.remove("active"));
      document.getElementById("season-" + s).classList.add("active");
      applyLayout();
    }

    function applyLayout() {
      var mobile = window.innerWidth < 769;
      var active = document.querySelector(".season-wrap.active");
      if (!active) return;
      var dw = active.querySelector(".desktop-wrap");
      var mw = active.querySelector(".mobile-wrap");
      if (dw) dw.style.display = mobile ? "none" : "block";
      if (mw) mw.style.display = mobile ? "block" : "none";
      var wrap = mobile ? mw : dw;
      if (wrap) {
        var gdiv = wrap.querySelector(".js-plotly-plot");
        if (gdiv) Plotly.Plots.resize(gdiv);
      }
    }

    window.addEventListener("load", applyLayout);
    window.addEventListener("resize", applyLayout);
  </script>
